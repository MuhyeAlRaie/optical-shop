<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f5f2"/>
      <stop offset="1" stop-color="#eae5df"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(58,58,69,0.85)"/>
      <stop offset="1" stop-color="rgba(58,58,69,0.55)"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.6">
      <stop offset="0" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="360" fill="url(#bgGrad)"/>
  <g filter="url(#softShadow)">
    
<rect x="140" y="125" width="135" height="95" rx="22" ry="22" fill="url(#lensGrad)" stroke="rgb(18,18,18)" stroke-width="6"/>
<rect x="325" y="125" width="135" height="95" rx="22" ry="22" fill="url(#lensGrad)" stroke="rgb(18,18,18)" stroke-width="6"/>
<line x1="275" y1="148" x2="325" y2="148" stroke="rgb(18,18,18)" stroke-width="6" stroke-linecap="round"/>
<line x1="140" y1="145" x2="80" y2="125" stroke="rgb(18,18,18)" stroke-width="5" stroke-linecap="round"/>
<line x1="460" y1="145" x2="520" y2="125" stroke="rgb(18,18,18)" stroke-width="5" stroke-linecap="round"/>

  </g>
  <ellipse cx="220" cy="170" rx="35" ry="20" fill="url(#shine)" opacity="0.7"/>
  <ellipse cx="400" cy="170" rx="35" ry="20" fill="url(#shine)" opacity="0.7"/>
  <text x="30" y="40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1c1c1c">Wayfarer Matte Black</text>
  <text x="30" y="60" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">NORTHWAVE</text>
</svg>
