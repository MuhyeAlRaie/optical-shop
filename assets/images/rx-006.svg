<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f5f2"/>
      <stop offset="1" stop-color="#eae5df"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(220,235,245,0.45)"/>
      <stop offset="1" stop-color="rgba(200,225,240,0.20)"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.6">
      <stop offset="0" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="360" fill="url(#bgGrad)"/>
  <g filter="url(#softShadow)">
    
<path d="M 150 180 Q 150 135 195 135 L 270 135 Q 285 135 285 175 Q 285 215 240 215 L 180 215 Q 150 215 150 180 Z"
      fill="url(#lensGrad)" stroke="rgb(37,37,41)" stroke-width="3"/>
<path d="M 450 180 Q 450 135 405 135 L 330 135 Q 315 135 315 175 Q 315 215 360 215 L 420 215 Q 450 215 450 180 Z"
      fill="url(#lensGrad)" stroke="rgb(37,37,41)" stroke-width="3"/>
<path d="M 150 140 L 285 140" stroke="rgb(37,37,41)" stroke-width="9" stroke-linecap="round"/>
<path d="M 315 140 L 450 140" stroke="rgb(37,37,41)" stroke-width="9" stroke-linecap="round"/>
<line x1="285" y1="160" x2="315" y2="160" stroke="rgb(37,37,41)" stroke-width="5" stroke-linecap="round"/>
<line x1="150" y1="160" x2="90" y2="140" stroke="rgb(37,37,41)" stroke-width="4" stroke-linecap="round"/>
<line x1="450" y1="160" x2="510" y2="140" stroke="rgb(37,37,41)" stroke-width="4" stroke-linecap="round"/>

  </g>
  <ellipse cx="220" cy="170" rx="35" ry="20" fill="url(#shine)" opacity="0.7"/>
  <ellipse cx="400" cy="170" rx="35" ry="20" fill="url(#shine)" opacity="0.7"/>
  <text x="30" y="40" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#1c1c1c">Gunmetal Browline</text>
  <text x="30" y="60" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666">HERITAGE</text>
</svg>
